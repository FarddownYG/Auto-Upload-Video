name: YouTube Auto Publisher

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 10 * * *'
    - cron: '30 15 * * *'
    - cron: '0 18 * * *'
    - cron: '30 20 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick ffmpeg fonts-dejavu-core
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>/<policy domain="path" rights="read|write" pattern="@*"\/>/' /etc/ImageMagick-6/policy.xml

      - name: Install Python dependencies
        run: |
          pip install "moviepy==1.0.3" gtts numpy \
            google-api-python-client \
            google-auth-oauthlib \
            pillow requests

      - name: Run publisher
        env:
          MISTRAL_KEY:          ${{ secrets.MISTRAL_KEY }}
          ELEVEN_KEY:           ${{ secrets.ELEVEN_KEY }}
          YT_REFRESH_TOKEN:     ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID:         ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET_STR: ${{ secrets.YT_CLIENT_SECRET_STR }}
        run: python main.py
